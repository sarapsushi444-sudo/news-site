name: Update News Daily

on:
  schedule:
    # Runs at 9:00 AM UTC = 5:00 PM PHT (UTC+8)
    - cron: '0 9 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub UI

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Fetch latest news
        run: npm run fetch-news
        env:
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
          MARKETAUX_API_KEY: ${{ secrets.MARKETAUX_API_KEY }}
          NODE_ENV: production
      
      - name: Check for changes
        id: verify-changed-files
        run: |
          if git diff --quiet src/data/news.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push changes
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/news.json
          git commit -m "📰 Update news: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
      
      - name: Trigger deployment
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          echo "News updated successfully! Site will rebuild automatically."
